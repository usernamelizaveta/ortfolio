  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F5F5F5; overflow-x: hidden; }

    /* HEADER */
    .case-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 86px;
      padding: 20px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.13);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      z-index: 100;
    }
    .case-header__title { font-family: Inter, sans-serif; font-size: 18px; font-weight: 400; color: #000; }
    .case-header__nav { display: flex; align-items: center; gap: 32px; }
    .case-header__arrow, .case-header__close {
      font-family: Inter, sans-serif; font-size: 18px; font-weight: 400; color: #000;
      text-decoration: none; padding-bottom: 2px;
      border-bottom: 1px solid transparent; transition: border-color 0.3s ease;
    }
    .case-header__arrow:hover, .case-header__close:hover { border-bottom: 1px solid #000; }

    /* ── SECTION 1: CARDS ── */
    .cards-section {
      position: relative;
      height: 250vh;
      background: #F5F5F5;
    }

    .cards-sticky {
      position: sticky;
      top: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .card-layer {
      position: absolute;
      width: 100%;
      left: 0;
      will-change: transform;
    }
    .card-layer img { width: 100%; height: auto; display: block; }
    .card-layer--1 { z-index: 1; top: 10%; }
    .card-layer--2 { z-index: 2; top: -5%; }

    /* ── SECTION 2: PHOTO + TEXT + DIAGRAM (UNIFIED) ── */
    .photo-section {
      position: relative;
      height: 250vh;
      background: #fff;
    }

    .photo-sticky {
      position: sticky;
      top: 0;
      width: 100vw;
      height: 100vh;
      overflow: visible;
    }

    .photo-white-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff;
      z-index: 0;
    }

    .photo-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
    }

    .photo-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      pointer-events: none;
      will-change: transform;
    }

    .photo-word {
      display: flex;
      justify-content: center;
      width: 100%;
      will-change: transform, opacity;
    }

    .photo-word svg {
      mix-blend-mode: difference;
      width: 62%;
      height: auto;
    }

    .photo-diagram {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 160px);
      max-width: 1400px;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      top: 52%;
    }

    .photo-diagram img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top center;
      display: block;
    }

    #wDesign  { transform: translateX(-150vw); opacity: 0; }
    #wProcess { transform: translateX(150vw);  opacity: 0; }

    .understand-section {
      width: 100%;
      background: #fff;
    }

    .understand-img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

  <script>
    const cl1 = document.getElementById('cl1');
    const cl2 = document.getElementById('cl2');
    const wDesign = document.getElementById('wDesign');
    const wProcess = document.getElementById('wProcess');
    const cardsSection = document.getElementById('cardsSection');
    const photoSection = document.getElementById('photoSection');
    const singlePhoto = document.getElementById('singlePhoto');
    const textBlock = document.getElementById('textBlock');
    const svgDesign = document.getElementById('svgDesign');
    const svgProcess = document.getElementById('svgProcess');
    const photoDiagram = document.getElementById('photoDiagram');

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function setColor(t) {
      const v = Math.round(255 * (1 - t));
      const color = `rgb(${v},${v},${v})`;
      svgDesign.querySelectorAll('path').forEach(p => p.setAttribute('fill', color));
      svgProcess.querySelectorAll('path').forEach(p => p.setAttribute('fill', color));
    }

    // Store the final title position so it never moves after color transition
    let titleFinalTransform = 'translate(-50%, -50%) scale(1)';

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const vh = window.innerHeight;

      // CARDS
      const cardsTop = cardsSection.offsetTop;
      const cardsH = cardsSection.offsetHeight - vh;
      const cardsP = Math.max(0, Math.min(1, (scrollY - cardsTop) / cardsH));
      cl1.style.transform = `translateY(${-cardsP * 120}vh)`;
      cl2.style.transform = `translateY(${-cardsP * 80}vh)`;

      // PHOTO SECTION
      const photoTop = photoSection.offsetTop;
      const photoH = photoSection.offsetHeight - vh;
      const photoP = Math.max(0, Math.min(1, (scrollY - photoTop) / photoH));

      // Phase 1 (0 → 0.25): photo visible, text not yet
      if (photoP <= 0.25) {
        singlePhoto.style.opacity = 1;
        textBlock.style.transform = 'translate(-50%, -50%) scale(1)';
        wDesign.style.transition = 'none';
        wProcess.style.transition = 'none';
        wDesign.style.opacity = 0;
        wProcess.style.opacity = 0;
        wDesign.style.transform = 'translateX(-150vw)';
        wProcess.style.transform = 'translateX(150vw)';
        setColor(0);
        textBlock.style.zIndex = 2;
        photoDiagram.style.opacity = 0;
        photoDiagram.style.pointerEvents = 'none';
      }

      // Phase 2 (0.25 → 0.5): text slides in on photo
      else if (photoP <= 0.5) {
        const t = easeOut((photoP - 0.25) / 0.25);
        singlePhoto.style.opacity = 1;
        textBlock.style.transform = 'translate(-50%, -50%) scale(1)';
        wDesign.style.transition = 'opacity 0.4s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94)';
        wProcess.style.transition = 'opacity 0.4s ease, transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94)';
        wDesign.style.opacity = Math.min(1, t * 2);
        wProcess.style.opacity = Math.min(1, t * 2);
        wDesign.style.transform = `translateX(${(1 - t) * -150}vw)`;
        wProcess.style.transform = `translateX(${(1 - t) * 150}vw)`;
        setColor(0);
        photoDiagram.style.opacity = 0;
        photoDiagram.style.pointerEvents = 'none';
      }

      // Phase 3 (0.5 → 0.75): photo fades out, text scales down + color white→black
      else if (photoP <= 0.75) {
        const t = easeOut((photoP - 0.5) / 0.25);
        singlePhoto.style.opacity = 1 - t;
        wDesign.style.transition = 'none';
        wProcess.style.transition = 'none';
        wDesign.style.opacity = 1;
        wProcess.style.opacity = 1;
        wDesign.style.transform = 'translateX(0)';
        wProcess.style.transform = 'translateX(0)';
        const scale = 1 - t * 0.55;
        const moveUp = -t * 15;
        textBlock.style.transform = `translate(-50%, calc(-50% + ${moveUp}vh)) scale(${scale})`;
        setColor(t);
        photoDiagram.style.opacity = 0;
        photoDiagram.style.pointerEvents = 'none';
      }

      // Phase 4 (0.75 → 1): title settled, diagram fades in below
      else {
        const t = easeOut((photoP - 0.75) / 0.25);
        singlePhoto.style.opacity = 0;
        wDesign.style.opacity = 1;
        wProcess.style.opacity = 1;
        wDesign.style.transform = 'translateX(0)';
        wProcess.style.transform = 'translateX(0)';
        textBlock.style.transform = 'translate(-50%, calc(-50% - 15vh)) scale(0.45)';
        setColor(1);
        photoDiagram.style.opacity = t;
        photoDiagram.style.pointerEvents = t > 0.5 ? 'auto' : 'none';
      }
    }, { passive: true });
  </script>
