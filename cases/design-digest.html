<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Digest — Case Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; width: 100vw; height: 100vh; }

    .case-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 86px;
      padding: 20px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.13);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      z-index: 100;
    }
    .case-header__title { font-family: Inter, sans-serif; font-size: 18px; font-weight: 400; color: #000; }
    .case-header__nav { display: flex; align-items: center; gap: 32px; }
    .case-header__arrow, .case-header__close {
      font-family: Inter, sans-serif; font-size: 18px; font-weight: 400; color: #000;
      text-decoration: none; padding-bottom: 2px;
      border-bottom: 1px solid transparent; transition: border-color 0.3s ease;
    }
    .case-header__arrow:hover, .case-header__close:hover { border-bottom: 1px solid #000; }

    .canvas-wrap {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: grab;
    }
    .canvas-wrap.dragging { cursor: grabbing; }

    .canvas-inner {
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    .canvas-inner img {
      display: block;
      max-width: none;
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Inter, sans-serif;
      font-size: 13px;
      color: #555;
      background: rgba(255,255,255,0.85);
      padding: 6px 16px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>

  <header class="case-header">
    <span class="case-header__title">Design Digest</span>
    <nav class="case-header__nav">
      <a href="../cases/tax-pulse.html" class="case-header__arrow">← Previous</a>
      <a href="../cases/recruiting-platform.html" class="case-header__arrow">Next →</a>
      <a href="../index.html" class="case-header__close">Close</a>
    </nav>
  </header>

  <div class="canvas-wrap" id="wrap">
    <div class="canvas-inner" id="inner">
      <img src="../assets/images/design-digest/canvas.png" alt="Design Digest Canvas" id="canvasImg">
    </div>
  </div>

  <div class="hint" id="hint">Click and drag to explore</div>

  <script>
    const wrap = document.getElementById('wrap');
    const inner = document.getElementById('inner');
    const img = document.getElementById('canvasImg');
    const hint = document.getElementById('hint');

    const SCALE = 0.28;
    let dragging = false, startX, startY, tx = 0, ty = 0;

    img.style.transformOrigin = 'top left';
    img.style.transform = `scale(${SCALE})`;

    function init() {
      const scaledW = img.naturalWidth * SCALE;
      tx = -(scaledW / 2) + (window.innerWidth / 2);
      ty = 0;
      inner.style.transform = `translate(${tx}px, ${ty}px)`;
    }

    if (img.complete && img.naturalWidth > 0) { init(); } else { img.onload = init; }

    setTimeout(() => { hint.style.opacity = '0'; }, 3000);

    function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

    function applyTransform() {
      const totalW = img.naturalWidth * SCALE;
      const totalH = img.naturalHeight * SCALE;
      tx = clamp(tx, -(totalW - window.innerWidth + 100), 100);
      ty = clamp(ty, -(totalH - window.innerHeight + 100), 100);
      inner.style.transform = `translate(${tx}px, ${ty}px)`;
    }

    wrap.addEventListener('mousedown', e => {
      dragging = true;
      startX = e.clientX - tx;
      startY = e.clientY - ty;
      wrap.classList.add('dragging');
      e.preventDefault();
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      tx = e.clientX - startX;
      ty = e.clientY - startY;
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
      wrap.classList.remove('dragging');
    });

    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      tx -= e.deltaX;
      ty -= e.deltaY;
      applyTransform();
    }, { passive: false });

    wrap.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        dragging = true;
        startX = e.touches[0].clientX - tx;
        startY = e.touches[0].clientY - ty;
      }
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (!dragging || e.touches.length !== 1) return;
      tx = e.touches[0].clientX - startX;
      ty = e.touches[0].clientY - startY;
      applyTransform();
    }, { passive: true });

    window.addEventListener('touchend', () => { dragging = false; });
  </script>

</body>
</html>
