<head>

  <title>Trashout — Case Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow-x: hidden; }

    .case-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 86px;
      padding: 20px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.13);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      z-index: 100;
    }
    .case-header__title { font-family: Inter, sans-serif; font-size: 18px; font-weight: 400; color: #fff; }
    .case-header__nav { display: flex; align-items: center; gap: 32px; }
    .case-header__arrow, .case-header__close {
      font-family: Inter, sans-serif; font-size: 18px; font-weight: 400; color: #fff;
      text-decoration: none; padding-bottom: 2px;
      border-bottom: 1px solid transparent; transition: border-color 0.3s ease;
    }
    .case-header__arrow:hover, .case-header__close:hover { border-bottom: 1px solid #fff; }

    .case-content section { width: 100%; font-size: 0; }
    .case-content section img { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <header class="case-header">
    <span class="case-header__title">Trashout</span>
    <nav class="case-header__nav">
      <a href="../cases/recruiting-platform.html" class="case-header__arrow">← Previous</a>
      <a href="../cases/dataops-performance-suite.html" class="case-header__arrow">Next →</a>

  <div class="case-content">
    <section><img src="../assets/images/trashout/hero.png" alt="Hero"></section>
    <section><img src="../assets/images/trashout/overview.png" alt="Overview"></section>
    <section><img src="../assets/images/trashout/research.png" alt="Research"></section>
    <section><img src="../assets/images/trashout/personas.png" alt="Personas"></section>
    <section><img src="../assets/images/trashout/user-flow.png" alt="User Flow"></section>
    <section><img src="../assets/images/trashout/wireframes.png" alt="Wireframes"></section>
    <section><img src="../assets/images/trashout/ui-design.png" alt="UI Design"></section>
  </div>
